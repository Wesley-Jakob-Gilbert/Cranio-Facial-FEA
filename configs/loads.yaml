# Pressure distribution along the arch (anterior-to-posterior gradient).
# ant_post_ratio > 1 means higher pressure anteriorly (where tongue tip presses).
# The weight at each palate node is linearly interpolated from posterior_weight
# to anterior_weight, then rescaled so total force is preserved.
# Set to 1.0 for uniform pressure (legacy behavior).
pressure_distribution:
  ant_post_ratio: 2.5    # anterior pressure / posterior pressure

load_cases:
  low_kpa:
    tongue_kpa: 0.5
    muscle_force_n: 0.0
  medium_kpa:
    tongue_kpa: 2.0
    muscle_force_n: 0.0
  high_kpa:
    tongue_kpa: 5.0
    muscle_force_n: 0.0

  low_kpa_plus_muscle:
    tongue_kpa: 0.5
    muscle_force_n: 6.0
  medium_kpa_plus_muscle:
    tongue_kpa: 2.0
    muscle_force_n: 6.0
  high_kpa_plus_muscle:
    tongue_kpa: 5.0
    muscle_force_n: 6.0

  medium_kpa_plus_muscle_2n:
    tongue_kpa: 2.0
    muscle_force_n: 2.0
  medium_kpa_plus_muscle_4n:
    tongue_kpa: 2.0
    muscle_force_n: 4.0
  medium_kpa_plus_muscle_8n:
    tongue_kpa: 2.0
    muscle_force_n: 8.0

# Remodeling study cases — used by scripts/remodeling_loop.sh
# mewing:       sustained tongue-on-palate posture (2 kPa, adolescent range)
# mouth_breathing: no palate contact; zero tongue load produces zero nodal forces,
#                  which is the correct mechanical analog for absent tongue pressure
  mewing:
    tongue_kpa: 2.0
    muscle_force_n: 0.0
    scenario: mewing
  mouth_breathing:
    tongue_kpa: 0.0
    muscle_force_n: 0.0
    gravity: true
    scenario: mouth_breathing
